name: pages

# Regenerate the live feature showcase on every push to main and publish it
# via GitHub Pages: the three example scripts are rendered against the JUST-
# BUILT bundles, so the pages at
#   https://doeringchristian.github.io/cairn-plot/
# always match the code — no stale committed HTML involved.
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: render example pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: build self-contained bundles
        working-directory: ui
        run: |
          npm ci
          npm run build:plot-inline
          node scripts/sync-plot-assets.mjs
      - uses: astral-sh/setup-uv@v5
      - name: create venv + editable install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: render showcase pages
        run: |
          mkdir -p site
          uv run python examples/demo_cairn_plot.py -o site/gallery.html
          uv run python examples/report_cairn_plot.py -o site/report.html
          uv run python examples/demo_url_images.py -o site/url-images.html
          cp docs/pages-index.html site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
