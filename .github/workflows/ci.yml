name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ui:
    name: ui (tsc · node tests · schema · boundary · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - name: typecheck (tsc -b --noEmit)
        run: npm run typecheck
      - name: node unit tests
        run: npm test
      - name: schema drift guard
        run: npm run check:plot-schema
      - name: boundary lint (no lib→app imports)
        run: npm run check:plot-boundary
      - name: build self-contained bundles
        run: npm run build:plot-inline
      - name: package-data sync guard
        run: npm run check:plot-assets

  python:
    name: python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: create venv + editable install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: pytest
        run: uv run pytest tests/ -q

  wheel:
    name: wheel + bare-venv quickstart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: build wheel
        run: uv build
      - name: bare-venv install + quickstart render
        run: |
          uv venv /tmp/bare
          uv pip install --python /tmp/bare/bin/python dist/*.whl pillow
          cat > /tmp/quickstart.py <<'PY'
          import numpy as np
          import cairn_plot as cp
          rep = (
              cp.report("QS")
              .md("# hi")
              .add(cp.Line(np.arange(50).cumsum()))
              .add(cp.Image(np.random.rand(48, 48)))
          )
          out = rep.save("/tmp/qs.html")
          size = __import__("os").path.getsize(out)
          assert size > 10_000, size
          print("rendered", size, "bytes offline")
          PY
          /tmp/bare/bin/python /tmp/quickstart.py

  smoke:
    name: smoke:plot (headless gallery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: astral-sh/setup-uv@v5
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      - name: python venv (for the demo the smoke drives)
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: build bundles + sync package data
        working-directory: ui
        run: |
          npm ci
          npm run build:plot-inline
          npm run sync:plot-assets
      - name: smoke render (22/22 sections)
        working-directory: ui
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run smoke:plot
